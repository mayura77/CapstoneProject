apiVersion: apps/v1
kind: Deployment
metadata:
  name: capstone-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: capstone
  template:
    metadata:
      labels:
        app: capstone
    spec:
      containers:
      - name: capstone-app
        image: capstoneacr12345.azurecr.io/capstone-app:v1
        ports:
        - containerPort: 3000
