trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  - group: capstone-secrets

stages:

- stage: Build
  displayName: Build Docker Image
  jobs:
  - job: BuildJob
    steps:
    - script: |
        echo "Building Docker image..."
        docker build -t capstoneacr12345.azurecr.io/capstone-app:$(Build.BuildId) .
        echo "Build done!"
      displayName: Build image

    # added this after reading that pipelines should have a test step
    # node --check just verifies the app.js file has no syntax errors
    - script: node --check app.js && echo "app check passed"
      displayName: check app syntax

- stage: Push
  displayName: Push to ACR
  dependsOn: Build
  jobs:
  - job: PushJob
    steps:
    - script: |
        echo "Logging into ACR..."
        docker login capstoneacr12345.azurecr.io -u $(ACR_USERNAME) -p $(ACR_PASSWORD)
        echo "Building and pushing..."
        docker build -t capstoneacr12345.azurecr.io/capstone-app:$(Build.BuildId) .
        docker push capstoneacr12345.azurecr.io/capstone-app:$(Build.BuildId)
        echo "Push complete!"
      displayName: Push image to ACR

- stage: Deploy
  displayName: Deploy to AKS
  dependsOn: Push
  jobs:
  - job: DeployJob
    steps:
    - task: AzureCLI@2
      displayName: Deploy to Kubernetes
      inputs:
        azureSubscription: azure-connection
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          echo "Getting AKS credentials..."
          az aks get-credentials --resource-group capstone-rg --name capstone-aks --overwrite-existing
          echo "Deploying to AKS..."
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          echo "Checking pods..."
          kubectl get pods
          echo "Done!"
